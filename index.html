<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploud Speed Test Harian</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .container { display: flex; width: 90%; max-width: 1100px; align-items: center; justify-content: space-between; gap: 50px; }
        
        .left-side { flex: 1.2; }
        h1 { font-size: 4rem; line-height: 1.1; margin-bottom: 10px; font-weight: 800; }
        p { color: #888; font-size: 1.2rem; margin-bottom: 30px; }
        
        #startBtn { background: #28a745; color: #fff; border: none; padding: 18px 50px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        #startBtn:hover { background: #218838; transform: scale(1.05); }

        .right-side {
            flex: 1; max-width: 450px; background: rgba(255,255,255,0.05); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px;
            opacity: 0; transform: translateX(100px); pointer-events: none; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show-dashboard { opacity: 1 !important; transform: translateX(0) !important; pointer-events: auto !important; }

        /* Area Upload & Preview */
        .upload-box { border: 2px dashed #28a745; padding: 20px; text-align: center; border-radius: 15px; cursor: pointer; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .preview-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 100%; margin-top: 10px; }
        .preview-container img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; border: 1px solid #28a745; }
        
        .small-text { font-size: 11px; color: #666; display: block; margin: 10px 0 20px 0; text-align: center; }
        
        .input-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .input-group { flex: 1; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid #444; padding: 12px; color: #fff; border-radius: 8px; outline: none; font-size: 14px; text-align: center; }
        .input-group input:focus { border-color: #28a745; }

        .process-btn { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .process-btn:hover { background: #28a745; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-side">
            <h1>Uploud Speed test Harian</h1>
            <p>Gedung-gedung kementrian pekerja umum</p>
            <button id="startBtn">Start</button>
        </div>

        <div class="right-side" id="dashboard">
            <div class="upload-box" id="dropZone" onclick="document.getElementById('f').click()">
                <div id="uploadPlaceholder">
                    <div style="font-size: 30px; color: #28a745; font-weight: bold;">+ + +</div>
                    <div style="font-size: 14px; font-weight: 600;">Import Photo</div>
                </div>
                <div class="preview-container" id="preview"></div>
                <input type="file" id="f" hidden multiple accept="image/*">
            </div>
            <span class="small-text">*maximal photo 8</span>

            <div class="input-row">
                <div class="input-group">
                    <label>Tanggal</label>
                    <input type="text" id="tgl" placeholder="DD / MM / YYYY" maxlength="10">
                </div>
                <div class="input-group">
                    <label>Waktu</label>
                    <input type="text" id="wkt" placeholder="HH : MM" maxlength="5">
                </div>
            </div>

            <button class="process-btn" id="proc">Processed</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const dashboard = document.getElementById('dashboard');
        const fileInput = document.getElementById('f');
        const preview = document.getElementById('preview');
        const placeholder = document.getElementById('uploadPlaceholder');
        const tglInput = document.getElementById('tgl');
        const wktInput = document.getElementById('wkt');

        // 1. Munculkan Dashboard
        startBtn.addEventListener('click', () => {
            dashboard.classList.add('show-dashboard');
            startBtn.style.opacity = '0';
            startBtn.style.pointerEvents = 'none';
            
            const now = new Date();
            tglInput.value = now.toLocaleDateString('id-ID').replace(/\//g, ' / ');
            wktInput.value = now.getHours().toString().padStart(2, '0') + ' : ' + now.getMinutes().toString().padStart(2, '0');
        });

        // 2. Validasi & Preview Foto
        fileInput.addEventListener('change', function() {
            const files = this.files;
            
            if (files.length > 8) {
                alert("⛔ CANCEL! Kamu upload " + files.length + " foto. Batasan maksimal cuma 8 foto. Silakan ulang lagi!");
                this.value = ""; // Reset input
                preview.innerHTML = "";
                placeholder.style.display = "block";
                return;
            }

            // Kalau 8 atau kurang, tampilkan preview
            preview.innerHTML = "";
            if (files.length > 0) {
                placeholder.style.display = "none";
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        preview.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            } else {
                placeholder.style.display = "block";
            }
        });

        // 3. Auto Format Tanggal (DD / MM / YYYY)
        tglInput.addEventListener('input', function(e) {
            let v = this.value.replace(/\D/g, '');
            if (v.length > 2) v = v.substring(0,2) + ' / ' + v.substring(2);
            if (v.length > 7) v = v.substring(0,7) + ' / ' + v.substring(7,11);
            this.value = v;
        });

        // 4. Auto Format Waktu (HH : MM)
        wktInput.addEventListener('input', function(e) {
            let v = this.value.replace(/\D/g, '');
            if (v.length > 2) v = v.substring(0,2) + ' : ' + v.substring(2,4);
            this.value = v;
        });

        // 5. Tombol Processed
        document.getElementById('proc').addEventListener('click', function() {
            if (fileInput.files.length === 0) {
                alert("Pilih foto dulu bos!");
                return;
            }
            this.innerText = "SENGING TO N8N...";
            this.style.background = "#28a745";
            this.style.color = "#fff";
            
            setTimeout(() => {
                alert("Data Terkirim! Cek di n8n.");
                this.innerText = "PROCESSED";
                this.style.background = "#fff";
                this.style.color = "#000";
            }, 1500);
        });
    </script>
</body>
</html>
